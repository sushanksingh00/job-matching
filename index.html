<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job-Matching</title>
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 28px 18px;
        background: #fff;
        color: #111;
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
      }

      .header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .sub {
        margin: 0;
        font-size: 13px;
        color: #222;
      }

      .panel {
        border: 1px solid #111;
        border-radius: 14px;
        padding: 18px;
      }

      .form-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .label {
        font-size: 13px;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 170px;
        padding: 12px;
        border: 1px solid #111;
        border-radius: 12px;
        font: inherit;
        color: #111;
        background: #fff;
        resize: vertical;
      }

      input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #111;
        border-radius: 12px;
        background: #fff;
        color: #111;
      }

      textarea:focus-visible,
      input[type="file"]:focus-visible,
      button:focus-visible {
        outline: 2px solid #111;
        outline-offset: 2px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 2px;
      }

      .file-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .file-actions input[type="file"] {
        flex: 1;
        min-width: 0;
      }

      button {
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 700;
        border: 1px solid #111;
        border-radius: 12px;
        background: #111;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(0.95);
      }

      .results {
        margin-top: 16px;
      }

      .item {
        max-width: 100%;
        margin: 0;
        padding: 16px;
        border: 1px solid #111;
        border-radius: 14px;
      }

      .item h2 {
        margin: 0 0 10px;
        font-size: 16px;
        font-weight: 800;
        background: linear-gradient(90deg, #d7191c 0%, #fdae61 50%, #1a9641 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .item h3 {
        margin: 14px 0 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .item p {
        margin: 0;
      }

      @media (min-width: 860px) {
        .form-container {
          grid-template-columns: 1.3fr 0.7fr;
          align-items: start;
        }
        .row.full {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 520px) {
        .file-actions {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Check your match</h1>
      <p class="sub">Paste a job description and upload your resume PDF.</p>
    </div>

    <div class="panel">
      <div class="form-container">
        <div class="row full">
          <div class="label">Job description</div>
          <textarea id="JobDesc" name="job_desc" rows="8" placeholder="Paste the job description here..."></textarea>
        </div>

        <div class="row">
          <div class="label">Resume (PDF)</div>
          <div class="file-actions">
            <input id="ResumeFile" type="file" name="file" accept="application/pdf" />
            <button type="button" onclick="getRecommendations()">Analyze</button>
          </div>
        </div>
      </div>

      <div id="results" class="results"></div>
    </div>
  </div>

  <script>
    async function getRecommendations(){
      const API_URL = 'https://0.0.0.0:8000/job-matching-i7ec.onrender.com/upload';
    //   const API_URL = 'http://0.0.0.0:8000/upload';


      const job = document.getElementById("JobDesc").value;
      const fileInput = document.getElementById("ResumeFile");
      const results = document.getElementById("results");

      results.innerHTML = "Uploading...";

      if (!job || job.trim().length === 0) {
        results.innerHTML = "<p style='color:red;'>Please paste a job description.</p>";
        return;
      }

      if (!fileInput.files || fileInput.files.length === 0) {
        results.innerHTML = "<p style='color:red;'>Please choose a resume PDF.</p>";
        return;
      }

      const formData = new FormData();
      formData.append('job_desc', job);
      formData.append('file', fileInput.files[0]);
      console.log(formData);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });

        const contentType = response.headers.get('content-type') || '';
        const data = contentType.includes('application/json')
          ? await response.json()
          : { detail: await response.text() };

        results.innerHTML = "";

        if (!response.ok) {
          results.innerHTML = `<p style='color:red;'>${data.detail || 'Upload failed'}</p>`;
          return;
        }

        const score = typeof data.final_score === 'number' ? data.final_score : Number(data.final_score);
        const matched = data?.feedback?.matched || [];
        const missing = data?.feedback?.missing || [];

        let card = `
          <div class="item">
            <h2>Match Score: ${Number.isFinite(score) ? score.toFixed(3)*100 : data.final_score*100}%</h2>
            <h3>Matched Skills</h3>
            <p>${matched.length ? matched.join(', ') : '(none)'}</p>
            <h3>Missing Skills</h3>
            <p>${missing.length ? missing.join(', ') : '(none)'}</p>
          </div>
        `;

        results.innerHTML += card;
      } catch (err) {
        results.innerHTML = "<p style='color:red;'>Network error. Is your backend running on 127.0.0.1:5050?</p>";
      }
    }
  </script>
</body>
</html>
